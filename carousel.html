<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adopt-A-State IG Carousel Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@300;400;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f5f0e8;
      --brown: #3a2a1a;
      --amber: #c8860a;
      --faded-red: #b84040;
      --faded-blue: #3a5a8a;
      --dark: #1e1208;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1510;
      color: var(--cream);
      font-family: 'Source Serif 4', Georgia, serif;
      padding: 40px 20px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: rgba(245,240,232,0.5);
      margin-bottom: 32px;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .controls button {
      padding: 12px 28px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-generate { background: var(--amber); color: white; }
    .btn-generate:hover { background: #a06d08; }
    .btn-save {
      background: transparent;
      border: 1px solid rgba(244,239,228,0.3) !important;
      color: var(--cream);
    }
    .btn-save:hover { border-color: var(--amber) !important; color: var(--amber); }
    .carousel-strip {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding: 20px 0 40px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .carousel-strip::-webkit-scrollbar { height: 6px; }
    .carousel-strip::-webkit-scrollbar-track { background: rgba(244,239,228,0.05); }
    .carousel-strip::-webkit-scrollbar-thumb { background: rgba(200,134,10,0.3); border-radius: 3px; }
    .slide-wrapper {
      flex-shrink: 0;
      scroll-snap-align: center;
      text-align: center;
    }
    .slide-wrapper canvas {
      width: 270px;
      height: 337px;
      border: 1px solid rgba(244,239,228,0.1);
    }
    .slide-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(244,239,228,0.3);
      margin-top: 8px;
      text-transform: uppercase;
    }
    .progress {
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(244,239,228,0.4);
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>

<h1>IG Carousel Generator</h1>
<p class="subtitle">10 slides, 1080 x 1350px, ready for Instagram</p>

<div class="controls">
  <button class="btn-generate" onclick="generateAll()">Generate Carousel</button>
  <button class="btn-save" onclick="saveAll()">Save All Slides</button>
</div>

<div class="carousel-strip" id="strip"></div>
<p class="progress" id="progress"></p>

<script>
const W = 1080, H = 1350;
const PAD = 100;
const CX = W / 2;

// ── Drawing Helpers (sized for phone viewing) ──

function drawGrain(ctx) {
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tc = tmp.getContext('2d');
  const imgData = tc.createImageData(W, H);
  for (let i = 0; i < imgData.data.length; i += 4) {
    const v = Math.random() * 255;
    imgData.data[i] = v;
    imgData.data[i+1] = v;
    imgData.data[i+2] = v;
    imgData.data[i+3] = 18;
  }
  tc.putImageData(imgData, 0, 0);
  ctx.drawImage(tmp, 0, 0);
}

function eyebrow(ctx, text, y) {
  ctx.font = '24px "DM Mono", monospace';
  ctx.fillStyle = '#c8860a';
  ctx.textAlign = 'center';
  ctx.fillText(text, CX, y);
}

function title(ctx, text, y, size) {
  ctx.font = `bold ${size}px "Playfair Display", serif`;
  ctx.fillStyle = 'rgba(245,240,232,0.95)';
  ctx.textAlign = 'center';
  text.split('\n').forEach((line, i) => {
    ctx.fillText(line, CX, y + i * (size * 1.18));
  });
}

function italic(ctx, text, y, size, color) {
  ctx.font = `italic ${size}px "Playfair Display", serif`;
  ctx.fillStyle = color || 'rgba(245,240,232,0.5)';
  ctx.textAlign = 'center';
  text.split('\n').forEach((line, i) => {
    ctx.fillText(line, CX, y + i * (size * 1.35));
  });
}

function body(ctx, text, y, size) {
  ctx.font = `300 ${size}px "Source Serif 4", serif`;
  ctx.fillStyle = 'rgba(245,240,232,0.7)';
  ctx.textAlign = 'center';
  text.split('\n').forEach((line, i) => {
    ctx.fillText(line, CX, y + i * (size * 1.55));
  });
}

function amberLine(ctx, y) {
  ctx.strokeStyle = '#c8860a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(CX - 50, y);
  ctx.lineTo(CX + 50, y);
  ctx.stroke();
}

function footer(ctx, text) {
  ctx.font = '22px "DM Mono", monospace';
  ctx.fillStyle = 'rgba(245,240,232,0.2)';
  ctx.textAlign = 'center';
  ctx.fillText(text, CX, H - 60);
}

function bigStat(ctx, text, y) {
  ctx.font = 'bold 180px "Playfair Display", serif';
  ctx.fillStyle = '#c8860a';
  ctx.textAlign = 'center';
  ctx.fillText(text, CX, y);
}

function statPair(ctx, n1, l1, n2, l2, y) {
  const colW = (W - PAD * 2) / 2;
  ctx.textAlign = 'center';
  // Left
  ctx.font = 'bold 72px "Playfair Display", serif';
  ctx.fillStyle = '#b84040';
  ctx.fillText(n1, PAD + colW/2, y);
  ctx.font = '26px "Source Serif 4", serif';
  ctx.fillStyle = 'rgba(245,240,232,0.5)';
  ctx.fillText(l1, PAD + colW/2, y + 44);
  // Right
  ctx.font = 'bold 72px "Playfair Display", serif';
  ctx.fillStyle = '#b84040';
  ctx.fillText(n2, PAD + colW + colW/2, y);
  ctx.font = '26px "Source Serif 4", serif';
  ctx.fillStyle = 'rgba(245,240,232,0.5)';
  ctx.fillText(l2, PAD + colW + colW/2, y + 44);
}

function wrapText(ctx, text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line = '', ty = y;
  for (const w of words) {
    const test = line + w + ' ';
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line.trim(), x, ty);
      line = w + ' ';
      ty += lh;
    } else { line = test; }
  }
  ctx.fillText(line.trim(), x, ty);
}

// ── 10 Slides ──

const SLIDES = [
  // 1 — Cover
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'A TAXPAYER AWARENESS INITIATIVE', H * 0.20);
      title(ctx, 'You\'ve Been\nGiving\nAll Along.', H * 0.33, 100);
      amberLine(ctx, H * 0.62);
      body(ctx, 'Blue-state taxpayers quietly fund\nred-state infrastructure.\nNo thank you note. Ever.', H * 0.68, 36);
      footer(ctx, 'iadoptedastate.org');
    }
  },
  // 2 — The Big Number
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'THE FACTS', H * 0.22);
      bigStat(ctx, '$13.7B', H * 0.42);
      ctx.font = '36px "Source Serif 4", serif';
      ctx.fillStyle = 'rgba(245,240,232,0.6)';
      ctx.textAlign = 'center';
      ctx.fillText('California\'s net contribution', CX, H * 0.50);
      ctx.fillText('to the federal system', CX, H * 0.55);
      amberLine(ctx, H * 0.64);
      body(ctx, 'Roads. Hospitals. Schools.\nIn states that never said\nthank you.', H * 0.71, 38);
      footer(ctx, 'Rockefeller Institute of Government');
    }
  },
  // 3 — Mississippi
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'MEET YOUR BENEFICIARY', H * 0.14);
      ctx.font = '140px serif';
      ctx.textAlign = 'center';
      ctx.fillText('🌊', CX, H * 0.27);
      title(ctx, 'Mississippi', H * 0.37, 90);
      italic(ctx, '"America\'s Most Beloved\nBeneficiary"', H * 0.44, 34);
      amberLine(ctx, H * 0.54);
      statPair(ctx, '$2.13', 'per $1 sent', '$4.1B', 'net received', H * 0.63);
      body(ctx, 'Your taxes keep its roads\npassable and its bridges\nlargely intact.', H * 0.78, 36);
      footer(ctx, 'iadoptedastate.org');
    }
  },
  // 4 — Kentucky
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'MEET YOUR BENEFICIARY', H * 0.14);
      ctx.font = '140px serif';
      ctx.textAlign = 'center';
      ctx.fillText('🐎', CX, H * 0.27);
      title(ctx, 'Kentucky', H * 0.37, 90);
      italic(ctx, '"Bootstraps Not Included"', H * 0.44, 34);
      amberLine(ctx, H * 0.54);
      statPair(ctx, '$2.41', 'per $1 sent', '$22.9B', 'net received', H * 0.63);
      body(ctx, 'Most federal aid per capita.\nStrong opinions about\ngovernment spending.', H * 0.78, 36);
      footer(ctx, 'iadoptedastate.org');
    }
  },
  // 5 — West Virginia
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'MEET YOUR BENEFICIARY', H * 0.14);
      ctx.font = '140px serif';
      ctx.textAlign = 'center';
      ctx.fillText('⛰️', CX, H * 0.27);
      title(ctx, 'West Virginia', H * 0.37, 82);
      italic(ctx, '"Almost Heaven,\nFully Funded"', H * 0.44, 34);
      amberLine(ctx, H * 0.54);
      statPair(ctx, '$2.07', 'per $1 sent', '$6.5B', 'net received', H * 0.63);
      body(ctx, 'Its infrastructure maintained\nby the involuntary generosity\nof NY, NJ, and CA.', H * 0.78, 36);
      footer(ctx, 'iadoptedastate.org');
    }
  },
  // 6 — The Scoreboard
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'BY THE NUMBERS', H * 0.12);
      title(ctx, 'The\nScoreboard.', H * 0.20, 88);
      amberLine(ctx, H * 0.38);
      const rows = [
        ['34 states', 'receive more than they give'],
        ['$0', 'thank you notes received'],
        ['77%', 'of MS Medicaid paid by you'],
        ['$3,284/yr', 'Alaska pays residents to live there'],
      ];
      let y = H * 0.44;
      rows.forEach(([num, label]) => {
        ctx.font = 'bold 56px "Playfair Display", serif';
        ctx.fillStyle = '#c8860a';
        ctx.textAlign = 'left';
        ctx.fillText(num, PAD, y);
        ctx.font = '32px "Source Serif 4", serif';
        ctx.fillStyle = 'rgba(245,240,232,0.55)';
        ctx.fillText(label, PAD, y + 48);
        y += 120;
      });
      footer(ctx, 'Tax Foundation · USASpending.gov');
    }
  },
  // 7 — Sponsored Infrastructure
  {
    bg: '#3a5a8a',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'BROUGHT TO YOU BY', H * 0.14);
      title(ctx, 'Sponsored\nInfrastructure.', H * 0.24, 80);
      amberLine(ctx, H * 0.42);
      const items = [
        ['I-65 Expansion, KY', 'New York Taxpayers 🧡'],
        ['Medicaid, Jackson MS', 'California Taxpayers 🧡'],
        ['Rural Broadband, WV', 'New Jersey Taxpayers 🧡'],
        ['FEMA Relief, SC', 'Massachusetts Taxpayers 🧡'],
      ];
      let y = H * 0.49;
      items.forEach(([proj, sponsor]) => {
        ctx.font = '36px "Source Serif 4", serif';
        ctx.fillStyle = 'rgba(245,240,232,0.9)';
        ctx.textAlign = 'left';
        ctx.fillText(proj, PAD, y);
        ctx.font = '28px "Source Serif 4", serif';
        ctx.fillStyle = '#c8860a';
        ctx.fillText(sponsor, PAD, y + 42);
        y += 110;
      });
      footer(ctx, 'Real projects. Real federal dollars.');
    }
  },
  // 8 — The Quote
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      ctx.font = 'italic 52px "Playfair Display", serif';
      ctx.fillStyle = 'rgba(245,240,232,0.9)';
      ctx.textAlign = 'center';
      wrapText(ctx, '"The beauty of Adopt-A-State is that you never had a choice. But you can still feel good about it."', CX, H * 0.28, W - PAD * 2, 72);
      amberLine(ctx, H * 0.66);
      ctx.font = '26px "DM Mono", monospace';
      ctx.fillStyle = '#c8860a';
      ctx.fillText('ADOPT-A-STATE FOUNDER', CX, H * 0.72);
      ctx.font = '24px "Source Serif 4", serif';
      ctx.fillStyle = 'rgba(245,240,232,0.4)';
      ctx.fillText('Unpaid, Like Most of This', CX, H * 0.76);
      footer(ctx, 'iadoptedastate.org');
    }
  },
  // 9 — Make Your Card CTA
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'SHOW YOUR APPRECIATION', H * 0.22);
      title(ctx, 'Make Your\nOwn Card.', H * 0.34, 96);
      italic(ctx, 'Since They Won\'t\nDo It for You.', H * 0.55, 52, '#c8860a');
      amberLine(ctx, H * 0.70);
      body(ctx, 'Upload your photo. Pick your state.\nSay what they never will.', H * 0.76, 36);
      footer(ctx, 'iadoptedastate.org/card-generator');
    }
  },
  // 10 — Closer / CTA
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      ctx.font = '200px serif';
      ctx.textAlign = 'center';
      ctx.fillText('🫶', CX, H * 0.30);
      title(ctx, 'Adopt-A-State', H * 0.44, 80);
      italic(ctx, 'A Taxpayer Awareness Initiative', H * 0.51, 30);
      amberLine(ctx, H * 0.58);
      body(ctx, 'They can\'t do it alone.\nThey never could.', H * 0.65, 42);
      // URL box
      const boxW = 620, boxH = 90;
      ctx.strokeStyle = 'rgba(200,134,10,0.5)';
      ctx.lineWidth = 2.5;
      ctx.strokeRect((W - boxW)/2, H * 0.76, boxW, boxH);
      ctx.font = '34px "DM Mono", monospace';
      ctx.fillStyle = '#c8860a';
      ctx.fillText('iadoptedastate.org', CX, H * 0.76 + boxH/2 + 12);
      ctx.font = '22px "Source Serif 4", serif';
      ctx.fillStyle = 'rgba(245,240,232,0.35)';
      ctx.fillText('This is real. All of it.', CX, H * 0.92);
    }
  },
];

// ── Generate ──

function generateAll() {
  const strip = document.getElementById('strip');
  const prog = document.getElementById('progress');
  strip.innerHTML = '';
  prog.style.display = 'block';
  prog.textContent = 'Generating...';

  SLIDES.forEach((slide, i) => {
    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    canvas.id = `slide-${i}`;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = slide.bg;
    ctx.fillRect(0, 0, W, H);
    slide.render(ctx);

    // Slide dots
    for (let d = 0; d < 10; d++) {
      ctx.beginPath();
      ctx.arc(CX - 9*4.5 + d*9, H - 28, 3.5, 0, Math.PI*2);
      ctx.fillStyle = d === i ? '#c8860a' : 'rgba(245,240,232,0.15)';
      ctx.fill();
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'slide-wrapper';
    wrapper.appendChild(canvas);
    const label = document.createElement('p');
    label.className = 'slide-label';
    label.textContent = `Slide ${i+1} of 10`;
    wrapper.appendChild(label);
    strip.appendChild(wrapper);
  });

  prog.textContent = 'All 10 slides generated — scroll to preview →';
}

async function saveAll() {
  if (!document.querySelectorAll('.carousel-strip canvas').length) {
    generateAll();
    await new Promise(r => setTimeout(r, 100));
  }
  const all = document.querySelectorAll('.carousel-strip canvas');
  for (let i = 0; i < all.length; i++) {
    const blob = await new Promise(r => all[i].toBlob(r, 'image/png'));
    const link = document.createElement('a');
    link.download = `adopt-a-state-carousel-${String(i+1).padStart(2,'0')}.png`;
    link.href = URL.createObjectURL(blob);
    link.click();
    URL.revokeObjectURL(link.href);
    await new Promise(r => setTimeout(r, 200));
  }
}

generateAll();
</script>
</body>
</html>
