<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adopt-A-State IG Carousel Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@300;400;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f5f0e8;
      --brown: #3a2a1a;
      --amber: #c8860a;
      --faded-red: #b84040;
      --faded-blue: #3a5a8a;
      --dark: #1e1208;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1510;
      color: var(--cream);
      font-family: 'Source Serif 4', Georgia, serif;
      padding: 40px 20px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: rgba(245,240,232,0.5);
      margin-bottom: 32px;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .controls button {
      padding: 12px 28px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-generate { background: var(--amber); color: white; }
    .btn-generate:hover { background: #a06d08; }
    .btn-save {
      background: transparent;
      border: 1px solid rgba(244,239,228,0.3) !important;
      color: var(--cream);
    }
    .btn-save:hover { border-color: var(--amber) !important; color: var(--amber); }
    .carousel-strip {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding: 20px 0 40px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .carousel-strip::-webkit-scrollbar { height: 6px; }
    .carousel-strip::-webkit-scrollbar-track { background: rgba(244,239,228,0.05); }
    .carousel-strip::-webkit-scrollbar-thumb { background: rgba(200,134,10,0.3); border-radius: 3px; }
    .slide-wrapper {
      flex-shrink: 0;
      scroll-snap-align: center;
      text-align: center;
    }
    .slide-wrapper canvas {
      width: 270px;
      height: 337px;
      border: 1px solid rgba(244,239,228,0.1);
    }
    .slide-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(244,239,228,0.3);
      margin-top: 8px;
      text-transform: uppercase;
    }
    .progress {
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(244,239,228,0.4);
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>

<h1>IG Carousel Generator</h1>
<p class="subtitle">10 slides, 1080 x 1350px, ready for Instagram</p>

<div class="controls">
  <button class="btn-generate" onclick="generateAll()">Generate Carousel</button>
  <button class="btn-save" onclick="saveAll()">Save All Slides</button>
</div>

<div class="carousel-strip" id="strip"></div>
<p class="progress" id="progress"></p>

<script>
const W = 1080, H = 1350;
const PAD = 120;
const CX = W / 2;

// ── Drawing Helpers (IG-native sizes — readable on phone) ──

function drawGrain(ctx) {
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tc = tmp.getContext('2d');
  const imgData = tc.createImageData(W, H);
  for (let i = 0; i < imgData.data.length; i += 4) {
    const v = Math.random() * 255;
    imgData.data[i] = v;
    imgData.data[i+1] = v;
    imgData.data[i+2] = v;
    imgData.data[i+3] = 18;
  }
  tc.putImageData(imgData, 0, 0);
  ctx.drawImage(tmp, 0, 0);
}

function eyebrow(ctx, text, y) {
  ctx.font = '36px "DM Mono", monospace';
  ctx.fillStyle = '#c8860a';
  ctx.textAlign = 'center';
  ctx.fillText(text, CX, y);
}

function heading(ctx, text, y, size) {
  ctx.font = `bold ${size}px "Playfair Display", serif`;
  ctx.fillStyle = '#f5f0e8';
  ctx.textAlign = 'center';
  text.split('\n').forEach((line, i) => {
    ctx.fillText(line, CX, y + i * (size * 1.15));
  });
}

function sub(ctx, text, y, size, color) {
  ctx.font = `italic ${size}px "Playfair Display", serif`;
  ctx.fillStyle = color || 'rgba(245,240,232,0.55)';
  ctx.textAlign = 'center';
  text.split('\n').forEach((line, i) => {
    ctx.fillText(line, CX, y + i * (size * 1.4));
  });
}

function copy(ctx, text, y, size) {
  ctx.font = `300 ${size}px "Source Serif 4", serif`;
  ctx.fillStyle = 'rgba(245,240,232,0.75)';
  ctx.textAlign = 'center';
  text.split('\n').forEach((line, i) => {
    ctx.fillText(line, CX, y + i * (size * 1.5));
  });
}

function rule(ctx, y) {
  ctx.strokeStyle = '#c8860a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(CX - 60, y);
  ctx.lineTo(CX + 60, y);
  ctx.stroke();
}

function tag(ctx, text) {
  ctx.font = '28px "DM Mono", monospace';
  ctx.fillStyle = 'rgba(245,240,232,0.2)';
  ctx.textAlign = 'center';
  ctx.fillText(text, CX, H - 70);
}

// ── 10 Slides ──

const SLIDES = [
  // 1 — Cover
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'TAXPAYER AWARENESS', H * 0.25);
      heading(ctx, 'You\'ve Been\nGiving\nAll Along.', H * 0.40, 130);
      rule(ctx, H * 0.68);
      copy(ctx, 'No press release.\nNo thank you note.', H * 0.75, 48);
      tag(ctx, 'iadoptedastate.org');
    }
  },
  // 2 — The Big Number
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'CALIFORNIA ALONE', H * 0.25);
      ctx.font = 'bold 240px "Playfair Display", serif';
      ctx.fillStyle = '#c8860a';
      ctx.textAlign = 'center';
      ctx.fillText('$13.7B', CX, H * 0.48);
      ctx.font = '48px "Source Serif 4", serif';
      ctx.fillStyle = 'rgba(245,240,232,0.6)';
      ctx.fillText('net contribution to', CX, H * 0.57);
      ctx.fillText('the federal system', CX, H * 0.63);
      rule(ctx, H * 0.72);
      copy(ctx, 'No one said thank you.', H * 0.80, 48);
      tag(ctx, 'Rockefeller Institute');
    }
  },
  // 3 — Mississippi
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'YOUR BENEFICIARY', H * 0.15);
      ctx.font = '180px serif';
      ctx.textAlign = 'center';
      ctx.fillText('🌊', CX, H * 0.30);
      heading(ctx, 'Mississippi', H * 0.42, 110);
      rule(ctx, H * 0.50);
      // Stats — big and bold
      ctx.font = 'bold 120px "Playfair Display", serif';
      ctx.fillStyle = '#b84040';
      ctx.fillText('$2.13', CX, H * 0.64);
      ctx.font = '42px "Source Serif 4", serif';
      ctx.fillStyle = 'rgba(245,240,232,0.55)';
      ctx.fillText('received per $1 you sent', CX, H * 0.70);
      copy(ctx, '"America\'s Most Beloved\nBeneficiary"', H * 0.82, 44);
      tag(ctx, 'iadoptedastate.org');
    }
  },
  // 4 — Kentucky
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'YOUR BENEFICIARY', H * 0.15);
      ctx.font = '180px serif';
      ctx.textAlign = 'center';
      ctx.fillText('🐎', CX, H * 0.30);
      heading(ctx, 'Kentucky', H * 0.42, 110);
      rule(ctx, H * 0.50);
      ctx.font = 'bold 120px "Playfair Display", serif';
      ctx.fillStyle = '#b84040';
      ctx.fillText('$2.41', CX, H * 0.64);
      ctx.font = '42px "Source Serif 4", serif';
      ctx.fillStyle = 'rgba(245,240,232,0.55)';
      ctx.fillText('received per $1 you sent', CX, H * 0.70);
      copy(ctx, '"Bootstraps Not Included"', H * 0.82, 44);
      tag(ctx, 'iadoptedastate.org');
    }
  },
  // 5 — West Virginia
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'YOUR BENEFICIARY', H * 0.15);
      ctx.font = '180px serif';
      ctx.textAlign = 'center';
      ctx.fillText('⛰️', CX, H * 0.30);
      heading(ctx, 'West Virginia', H * 0.42, 100);
      rule(ctx, H * 0.50);
      ctx.font = 'bold 120px "Playfair Display", serif';
      ctx.fillStyle = '#b84040';
      ctx.fillText('$2.07', CX, H * 0.64);
      ctx.font = '42px "Source Serif 4", serif';
      ctx.fillStyle = 'rgba(245,240,232,0.55)';
      ctx.fillText('received per $1 you sent', CX, H * 0.70);
      copy(ctx, '"Almost Heaven,\nFully Funded"', H * 0.82, 44);
      tag(ctx, 'iadoptedastate.org');
    }
  },
  // 6 — The Scoreboard
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      heading(ctx, 'The\nScoreboard.', H * 0.18, 110);
      rule(ctx, H * 0.36);
      const rows = [
        ['34 states', 'take more than they give'],
        ['$0', 'thank you notes'],
        ['77%', 'of MS Medicaid is you'],
      ];
      let y = H * 0.44;
      rows.forEach(([num, label]) => {
        ctx.font = 'bold 80px "Playfair Display", serif';
        ctx.fillStyle = '#c8860a';
        ctx.textAlign = 'left';
        ctx.fillText(num, PAD, y);
        ctx.font = '42px "Source Serif 4", serif';
        ctx.fillStyle = 'rgba(245,240,232,0.55)';
        ctx.fillText(label, PAD, y + 60);
        y += 160;
      });
      tag(ctx, 'Tax Foundation');
    }
  },
  // 7 — Sponsored Infrastructure
  {
    bg: '#3a5a8a',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'BROUGHT TO YOU BY', H * 0.15);
      heading(ctx, 'Sponsored\nInfra.', H * 0.26, 100);
      rule(ctx, H * 0.44);
      const items = [
        ['I-65, Kentucky', 'NY Taxpayers 🧡'],
        ['Medicaid, Mississippi', 'CA Taxpayers 🧡'],
        ['Broadband, West Virginia', 'NJ Taxpayers 🧡'],
      ];
      let y = H * 0.52;
      items.forEach(([proj, sponsor]) => {
        ctx.font = '44px "Source Serif 4", serif';
        ctx.fillStyle = '#f5f0e8';
        ctx.textAlign = 'left';
        ctx.fillText(proj, PAD, y);
        ctx.font = '38px "Source Serif 4", serif';
        ctx.fillStyle = '#c8860a';
        ctx.fillText(sponsor, PAD, y + 54);
        y += 140;
      });
      tag(ctx, 'Real projects. Real dollars.');
    }
  },
  // 8 — The Quote
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      ctx.font = 'italic 72px "Playfair Display", serif';
      ctx.fillStyle = '#f5f0e8';
      ctx.textAlign = 'center';
      const q = '"You never had a choice. But you can still feel good about it."';
      // manual wrap for big text
      const lines = [
        '"You never',
        'had a choice.',
        'But you can',
        'still feel good',
        'about it."',
      ];
      let y = H * 0.25;
      lines.forEach(line => {
        ctx.fillText(line, CX, y);
        y += 100;
      });
      rule(ctx, H * 0.68);
      ctx.font = '36px "DM Mono", monospace';
      ctx.fillStyle = '#c8860a';
      ctx.fillText('ADOPT-A-STATE FOUNDER', CX, H * 0.75);
      copy(ctx, 'Unpaid, like most of this', H * 0.82, 40);
      tag(ctx, 'iadoptedastate.org');
    }
  },
  // 9 — Make Your Card CTA
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      eyebrow(ctx, 'YOUR TURN', H * 0.22);
      heading(ctx, 'Make Your\nOwn Card.', H * 0.36, 120);
      rule(ctx, H * 0.58);
      sub(ctx, 'Since they won\'t\ndo it for you.', H * 0.65, 64, '#c8860a');
      tag(ctx, 'iadoptedastate.org/card-generator');
    }
  },
  // 10 — Closer / CTA
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      heading(ctx, 'Adopt-A-State', H * 0.42, 100);
      rule(ctx, H * 0.56);
      copy(ctx, 'They can\'t do it alone.\nThey never could.', H * 0.64, 52);
      // URL box
      const boxW = 700, boxH = 110;
      const boxY = H * 0.78;
      ctx.strokeStyle = 'rgba(200,134,10,0.5)';
      ctx.lineWidth = 3;
      ctx.strokeRect((W - boxW)/2, boxY, boxW, boxH);
      ctx.font = '44px "DM Mono", monospace';
      ctx.fillStyle = '#c8860a';
      ctx.fillText('iadoptedastate.org', CX, boxY + boxH/2 + 16);
    }
  },
];

// ── Generate ──

function generateAll() {
  const strip = document.getElementById('strip');
  const prog = document.getElementById('progress');
  strip.innerHTML = '';
  prog.style.display = 'block';
  prog.textContent = 'Generating...';

  SLIDES.forEach((slide, i) => {
    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    canvas.id = `slide-${i}`;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = slide.bg;
    ctx.fillRect(0, 0, W, H);
    slide.render(ctx);

    // Slide dots
    for (let d = 0; d < 10; d++) {
      ctx.beginPath();
      ctx.arc(CX - 9*4.5 + d*9, H - 28, 3.5, 0, Math.PI*2);
      ctx.fillStyle = d === i ? '#c8860a' : 'rgba(245,240,232,0.15)';
      ctx.fill();
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'slide-wrapper';
    wrapper.appendChild(canvas);
    const label = document.createElement('p');
    label.className = 'slide-label';
    label.textContent = `Slide ${i+1} of 10`;
    wrapper.appendChild(label);
    strip.appendChild(wrapper);
  });

  prog.textContent = 'All 10 slides generated — scroll to preview →';
}

async function saveAll() {
  if (!document.querySelectorAll('.carousel-strip canvas').length) {
    generateAll();
    await new Promise(r => setTimeout(r, 100));
  }
  const all = document.querySelectorAll('.carousel-strip canvas');
  for (let i = 0; i < all.length; i++) {
    const blob = await new Promise(r => all[i].toBlob(r, 'image/png'));
    const link = document.createElement('a');
    link.download = `adopt-a-state-carousel-${String(i+1).padStart(2,'0')}.png`;
    link.href = URL.createObjectURL(blob);
    link.click();
    URL.revokeObjectURL(link.href);
    await new Promise(r => setTimeout(r, 200));
  }
}

generateAll();
</script>
</body>
</html>
