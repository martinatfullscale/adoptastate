<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adopt-A-State IG Carousel Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@300;400;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f5f0e8;
      --warm-white: #faf8f3;
      --brown: #3a2a1a;
      --mid-brown: #7a5c3a;
      --amber: #c8860a;
      --faded-red: #b84040;
      --faded-blue: #3a5a8a;
      --dark: #1e1208;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1510;
      color: var(--cream);
      font-family: 'Source Serif 4', Georgia, serif;
      padding: 40px 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
      color: var(--cream);
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: rgba(245,240,232,0.5);
      margin-bottom: 32px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .controls button {
      padding: 12px 28px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-generate {
      background: var(--amber);
      color: white;
    }
    .btn-generate:hover { background: #a06d08; }

    .btn-save {
      background: transparent;
      border: 1px solid rgba(244,239,228,0.3) !important;
      color: var(--cream);
    }
    .btn-save:hover { border-color: var(--amber) !important; color: var(--amber); }

    .carousel-strip {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding: 20px 0 40px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .carousel-strip::-webkit-scrollbar { height: 6px; }
    .carousel-strip::-webkit-scrollbar-track { background: rgba(244,239,228,0.05); }
    .carousel-strip::-webkit-scrollbar-thumb { background: rgba(200,134,10,0.3); border-radius: 3px; }

    .slide-wrapper {
      flex-shrink: 0;
      scroll-snap-align: center;
      text-align: center;
    }

    .slide-wrapper canvas {
      width: 270px;
      height: 337px;
      border: 1px solid rgba(244,239,228,0.1);
    }

    .slide-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(244,239,228,0.3);
      margin-top: 8px;
      text-transform: uppercase;
    }

    .progress {
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(244,239,228,0.4);
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>

<h1>IG Carousel Generator</h1>
<p class="subtitle">10 slides, 1080 x 1350px, ready for Instagram</p>

<div class="controls">
  <button class="btn-generate" onclick="generateAll()">Generate Carousel</button>
  <button class="btn-save" onclick="saveAll()">Save All Slides</button>
</div>

<div class="carousel-strip" id="strip"></div>
<p class="progress" id="progress"></p>

<script>
const W = 1080, H = 1350;
const PAD = 80;

const SLIDES = [
  // 1 — Cover
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      drawEyebrow(ctx, 'A TAXPAYER AWARENESS INITIATIVE', H * 0.22);
      drawTitle(ctx, 'You\'ve Been\nGiving\nAll Along.', H * 0.32, 72);
      drawAmberLine(ctx, H * 0.62);
      drawBody(ctx, 'For years, blue-state taxpayers have\nquietly funded red-state infrastructure.\nNo press release. No thank you note.', H * 0.67, 28);
      drawFooter(ctx, 'iadoptedastate.org');
    }
  },
  // 2 — The Big Number
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      drawEyebrow(ctx, 'THE FACTS', H * 0.25);
      drawBigStat(ctx, '$13.7B', H * 0.42);
      drawStatLabel(ctx, 'California\'s net contribution\nto the federal system (FY 2023)', H * 0.56);
      drawAmberLine(ctx, H * 0.68);
      drawBody(ctx, 'That money went to roads, hospitals, and\nschools in states that never said thank you.', H * 0.73, 26);
      drawFooter(ctx, 'Source: Rockefeller Institute of Government');
    }
  },
  // 3 — Mississippi
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      drawEyebrow(ctx, 'MEET YOUR BENEFICIARY', H * 0.18);
      drawStateEmoji(ctx, '🌊', H * 0.28);
      drawTitle(ctx, 'Mississippi', H * 0.40, 64);
      drawItalic(ctx, '"America\'s Most Beloved Beneficiary"', H * 0.48, 22);
      drawAmberLine(ctx, H * 0.54);
      drawTwoStats(ctx, '$2.13', 'received per $1 sent', '$4.1B', 'net received (2023)', H * 0.60);
      drawBody(ctx, 'Mississippi has received more than it\ncontributes for decades. With your support,\nits roads remain passable and its\nbridges remain... largely intact.', H * 0.76, 24);
      drawFooter(ctx, 'iadoptedastate.org');
    }
  },
  // 4 — Kentucky
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      drawEyebrow(ctx, 'MEET YOUR BENEFICIARY', H * 0.18);
      drawStateEmoji(ctx, '🐎', H * 0.28);
      drawTitle(ctx, 'Kentucky', H * 0.40, 64);
      drawItalic(ctx, '"Bootstraps Not Included"', H * 0.48, 22);
      drawAmberLine(ctx, H * 0.54);
      drawTwoStats(ctx, '$2.41', 'received per $1 sent', '$22.9B', 'net received (2023)', H * 0.60);
      drawBody(ctx, 'Kentucky receives the most federal aid\nper capita. It has strong opinions about\ngovernment spending. These two facts\nare, reportedly, unrelated.', H * 0.76, 24);
      drawFooter(ctx, 'iadoptedastate.org');
    }
  },
  // 5 — West Virginia
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      drawEyebrow(ctx, 'MEET YOUR BENEFICIARY', H * 0.18);
      drawStateEmoji(ctx, '⛰️', H * 0.28);
      drawTitle(ctx, 'West Virginia', H * 0.40, 58);
      drawItalic(ctx, '"Almost Heaven, Fully Funded"', H * 0.48, 22);
      drawAmberLine(ctx, H * 0.54);
      drawTwoStats(ctx, '$2.07', 'received per $1 sent', '$6.5B', 'net received (2023)', H * 0.60);
      drawBody(ctx, 'Mountain roads, rural hospitals, and aging\ninfrastructure maintained by the generous,\ninvoluntary contributions of NY, NJ,\nand CA taxpayers.', H * 0.76, 24);
      drawFooter(ctx, 'iadoptedastate.org');
    }
  },
  // 6 — The Scoreboard
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      drawEyebrow(ctx, 'BY THE NUMBERS', H * 0.15);
      drawTitle(ctx, 'The\nScoreboard.', H * 0.22, 60);
      drawAmberLine(ctx, H * 0.40);
      const rows = [
        ['34 states', 'receive more than they give'],
        ['$0', 'thank you notes received'],
        ['77%', 'of Mississippi\'s Medicaid paid by you'],
        ['$3,284/yr', 'Alaska pays residents to live there'],
        ['$15.6B', 'AL military bases funded by your taxes'],
      ];
      let y = H * 0.46;
      rows.forEach(([num, label]) => {
        ctx.font = 'bold 32px "Playfair Display", serif';
        ctx.fillStyle = '#c8860a';
        ctx.textAlign = 'left';
        ctx.fillText(num, PAD, y);
        ctx.font = '20px "Source Serif 4", serif';
        ctx.fillStyle = 'rgba(245,240,232,0.6)';
        ctx.fillText(label, PAD, y + 30);
        y += 86;
      });
      drawFooter(ctx, 'Source: Tax Foundation, USASpending.gov');
    }
  },
  // 7 — Sponsored Infrastructure
  {
    bg: '#3a5a8a',
    render(ctx) {
      drawGrain(ctx);
      drawEyebrow(ctx, 'BROUGHT TO YOU BY', H * 0.18);
      drawTitle(ctx, 'Sponsored\nInfrastructure.', H * 0.27, 56);
      drawAmberLine(ctx, H * 0.44);
      const items = [
        ['I-65 Expansion, Louisville KY', 'New York Taxpayers 🧡'],
        ['Medicaid Coverage, Jackson MS', 'California Taxpayers 🧡'],
        ['Rural Broadband, Morgantown WV', 'New Jersey Taxpayers 🧡'],
        ['FEMA Relief, Charleston SC', 'Massachusetts Taxpayers 🧡'],
      ];
      let y = H * 0.50;
      items.forEach(([proj, sponsor]) => {
        ctx.font = '24px "Source Serif 4", serif';
        ctx.fillStyle = 'rgba(245,240,232,0.9)';
        ctx.textAlign = 'left';
        ctx.fillText(proj, PAD, y);
        ctx.font = '18px "Source Serif 4", serif';
        ctx.fillStyle = '#c8860a';
        ctx.fillText(sponsor, PAD, y + 30);
        y += 82;
      });
      drawFooter(ctx, 'Real projects. Real federal dollars.');
    }
  },
  // 8 — The Quote
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      ctx.font = 'italic 40px "Playfair Display", serif';
      ctx.fillStyle = 'rgba(245,240,232,0.9)';
      ctx.textAlign = 'center';
      wrapText(ctx, '"The beauty of Adopt-A-State is that you never had a choice. But you can still feel good about it."', W / 2, H * 0.35, W - PAD * 2, 56);
      drawAmberLine(ctx, H * 0.68);
      ctx.font = '14px "Source Serif 4", serif';
      ctx.fillStyle = '#c8860a';
      ctx.letterSpacing = '3px';
      ctx.fillText('— ADOPT-A-STATE FOUNDER', W / 2, H * 0.73);
      ctx.font = '13px "Source Serif 4", serif';
      ctx.fillStyle = 'rgba(245,240,232,0.4)';
      ctx.fillText('Unpaid, Like Most of This', W / 2, H * 0.76);
      drawFooter(ctx, 'iadoptedastate.org');
    }
  },
  // 9 — Make Your Card CTA
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      drawEyebrow(ctx, 'SHOW YOUR APPRECIATION', H * 0.25);
      drawTitle(ctx, 'Make Your\nOwn Card.', H * 0.35, 68);
      drawAmberItalic(ctx, 'Since They Won\'t\nDo It for You.', H * 0.55, 40);
      drawAmberLine(ctx, H * 0.68);
      drawBody(ctx, 'Upload your photo, pick your state,\nand generate a shareable card that says\nwhat they never will: thank you.', H * 0.73, 26);
      drawFooter(ctx, 'iadoptedastate.org/card-generator');
    }
  },
  // 10 — Closer / CTA
  {
    bg: '#1e1208',
    render(ctx) {
      drawGrain(ctx);
      ctx.font = '160px serif';
      ctx.textAlign = 'center';
      ctx.fillText('🫶', W / 2, H * 0.30);
      drawTitle(ctx, 'Adopt-A-State', H * 0.42, 56);
      drawItalic(ctx, 'A Taxpayer Awareness Initiative', H * 0.48, 20);
      drawAmberLine(ctx, H * 0.54);
      drawBody(ctx, 'They can\'t do it alone.\nThey never could.', H * 0.60, 30);
      // URL box
      const boxW = 500, boxH = 70;
      ctx.strokeStyle = 'rgba(200,134,10,0.5)';
      ctx.lineWidth = 2;
      ctx.strokeRect((W - boxW) / 2, H * 0.72, boxW, boxH);
      ctx.font = '22px "DM Mono", monospace';
      ctx.fillStyle = '#c8860a';
      ctx.fillText('iadoptedastate.org', W / 2, H * 0.72 + boxH / 2 + 8);
      ctx.font = '16px "Source Serif 4", serif';
      ctx.fillStyle = 'rgba(245,240,232,0.4)';
      ctx.fillText('All data sourced from the Rockefeller Institute', W / 2, H * 0.86);
      ctx.fillText('of Government, Tax Foundation, and USASpending.gov.', W / 2, H * 0.88);
      ctx.fillText('This is real. All of it.', W / 2, H * 0.91);
    }
  },
];

// ── Drawing Helpers ──

function drawGrain(ctx) {
  // subtle noise overlay
  const imgData = ctx.createImageData(W, H);
  for (let i = 0; i < imgData.data.length; i += 4) {
    const v = Math.random() * 255;
    imgData.data[i] = v;
    imgData.data[i + 1] = v;
    imgData.data[i + 2] = v;
    imgData.data[i + 3] = 8;
  }
  ctx.putImageData(imgData, 0, 0);
}

function drawEyebrow(ctx, text, y) {
  ctx.font = '13px "DM Mono", monospace';
  ctx.fillStyle = '#c8860a';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '4px';
  ctx.fillText(text, W / 2, y);
}

function drawTitle(ctx, text, y, size) {
  ctx.font = `bold ${size}px "Playfair Display", serif`;
  ctx.fillStyle = 'rgba(245,240,232,0.95)';
  ctx.textAlign = 'center';
  const lines = text.split('\n');
  lines.forEach((line, i) => {
    ctx.fillText(line, W / 2, y + i * (size * 1.2));
  });
}

function drawItalic(ctx, text, y, size) {
  ctx.font = `italic ${size}px "Source Serif 4", serif`;
  ctx.fillStyle = 'rgba(245,240,232,0.5)';
  ctx.textAlign = 'center';
  ctx.fillText(text, W / 2, y);
}

function drawAmberItalic(ctx, text, y, size) {
  ctx.font = `italic ${size}px "Playfair Display", serif`;
  ctx.fillStyle = '#c8860a';
  ctx.textAlign = 'center';
  const lines = text.split('\n');
  lines.forEach((line, i) => {
    ctx.fillText(line, W / 2, y + i * (size * 1.3));
  });
}

function drawAmberLine(ctx, y) {
  ctx.strokeStyle = '#c8860a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 40, y);
  ctx.lineTo(W / 2 + 40, y);
  ctx.stroke();
}

function drawBody(ctx, text, y, size) {
  ctx.font = `300 ${size}px "Source Serif 4", serif`;
  ctx.fillStyle = 'rgba(245,240,232,0.65)';
  ctx.textAlign = 'center';
  const lines = text.split('\n');
  lines.forEach((line, i) => {
    ctx.fillText(line, W / 2, y + i * (size * 1.6));
  });
}

function drawBigStat(ctx, text, y) {
  ctx.font = 'bold 120px "Playfair Display", serif';
  ctx.fillStyle = '#c8860a';
  ctx.textAlign = 'center';
  ctx.fillText(text, W / 2, y);
}

function drawStatLabel(ctx, text, y) {
  ctx.font = '24px "Source Serif 4", serif';
  ctx.fillStyle = 'rgba(245,240,232,0.6)';
  ctx.textAlign = 'center';
  const lines = text.split('\n');
  lines.forEach((line, i) => {
    ctx.fillText(line, W / 2, y + i * 36);
  });
}

function drawStateEmoji(ctx, emoji, y) {
  ctx.font = '100px serif';
  ctx.textAlign = 'center';
  ctx.fillText(emoji, W / 2, y);
}

function drawTwoStats(ctx, num1, label1, num2, label2, y) {
  const colW = (W - PAD * 2) / 2;
  // Left stat
  ctx.font = 'bold 48px "Playfair Display", serif';
  ctx.fillStyle = '#b84040';
  ctx.textAlign = 'center';
  ctx.fillText(num1, PAD + colW / 2, y);
  ctx.font = '14px "Source Serif 4", serif';
  ctx.fillStyle = 'rgba(245,240,232,0.5)';
  ctx.fillText(label1, PAD + colW / 2, y + 30);
  // Right stat
  ctx.font = 'bold 48px "Playfair Display", serif';
  ctx.fillStyle = '#b84040';
  ctx.fillText(num2, PAD + colW + colW / 2, y);
  ctx.font = '14px "Source Serif 4", serif';
  ctx.fillStyle = 'rgba(245,240,232,0.5)';
  ctx.fillText(label2, PAD + colW + colW / 2, y + 30);
}

function drawFooter(ctx, text) {
  ctx.font = '13px "DM Mono", monospace';
  ctx.fillStyle = 'rgba(245,240,232,0.25)';
  ctx.textAlign = 'center';
  ctx.fillText(text, W / 2, H - 50);
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  let ty = y;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line.trim(), x, ty);
      line = word + ' ';
      ty += lineHeight;
    } else {
      line = test;
    }
  }
  ctx.fillText(line.trim(), x, ty);
}

// ── Generate ──

function generateAll() {
  const strip = document.getElementById('strip');
  const prog = document.getElementById('progress');
  strip.innerHTML = '';
  prog.style.display = 'block';
  prog.textContent = 'Generating...';

  SLIDES.forEach((slide, i) => {
    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    canvas.id = `slide-${i}`;
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = slide.bg;
    ctx.fillRect(0, 0, W, H);

    // Render content
    slide.render(ctx);

    // Slide number indicator (small dots at bottom)
    for (let d = 0; d < 10; d++) {
      ctx.beginPath();
      ctx.arc(W / 2 - 9 * 4.5 + d * 9, H - 24, 3, 0, Math.PI * 2);
      ctx.fillStyle = d === i ? '#c8860a' : 'rgba(245,240,232,0.15)';
      ctx.fill();
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'slide-wrapper';
    wrapper.appendChild(canvas);
    const label = document.createElement('p');
    label.className = 'slide-label';
    label.textContent = `Slide ${i + 1} of 10`;
    wrapper.appendChild(label);
    strip.appendChild(wrapper);
  });

  prog.textContent = 'All 10 slides generated — scroll to preview →';
}

async function saveAll() {
  const canvases = document.querySelectorAll('.carousel-strip canvas');
  if (!canvases.length) {
    generateAll();
    await new Promise(r => setTimeout(r, 100));
  }

  const allCanvases = document.querySelectorAll('.carousel-strip canvas');
  for (let i = 0; i < allCanvases.length; i++) {
    const canvas = allCanvases[i];
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    const link = document.createElement('a');
    link.download = `adopt-a-state-carousel-${String(i + 1).padStart(2, '0')}.png`;
    link.href = URL.createObjectURL(blob);
    link.click();
    URL.revokeObjectURL(link.href);
    await new Promise(r => setTimeout(r, 200));
  }
}

// Auto-generate on load
generateAll();
</script>
</body>
</html>
